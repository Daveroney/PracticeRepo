<h1>Karteikarten anlegen</h1>

<div class="form-group">
  <label for="create-selection">Auswahl:</label>
  <select name="indexCards" id="create-selection">
    <option value="existing">
      Karteikarte zu bestehender Kategorie hinzufügen
    </option>
    <option value="new">Neue Kategorie anlegen</option>
  </select>
</div>

<section class="index-card-creation">
  <div class="index-card-wrapper">
    <div class="index-card-border">
      <div class="index-card">
        <label for="question-set-dropdown">Kategorie wählen:</label>
        <select name="questionSetDropdown" id="question-set-dropdown">
          <option value="">Kategorie auswählen</option>
        </select>
        <h3>Titel / Frage eingeben</h3>
        <input
          id="index-card-question-text"
          type="text"
          placeholder="Frage eingeben"
        />

        <label for="question-difficulty">Schwierigkeit:</label>
        <select id="question-difficulty" name="question-difficulty">
          <option value="easy">Einfach</option>
          <option value="medium">Mittel</option>
          <option value="hard">Schwer</option>
        </select>

        <div class="index-card-answers">
          <h3>Antwortmöglichkeiten</h3>

          <div class="answer-item">
            <input
              type="text"
              id="create-card-answer-input-1"
              class="index-card-possible-answer"
              placeholder="Antwort hinzufügen"
            />
            <input
              type="checkbox"
              class="answer-correct-checkbox"
              title="Richtige Antwort"
            />
          </div>

          <button id="create-card-add-answer-button">Antwort hinzufügen</button>
        </div>
      </div>
    </div>
  </div>
  <div class="button-container">
    <button id="index-card-create-button">Karteikarte erstellen</button>
  </div>
</section>

<section class="question-set-creation">
  <div class="index-card-wrapper">
    <div class="index-card-border">
      <div class="index-card">
        <h2>Kartei-Kategorie</h2>
        <input
          id="question-set-user-input"
          type="text"
          placeholder="Kategorie eingeben"
          required
        />

        <div class="index-card-answers">
          <h3>Beschreibung</h3>
          <input
            id="question-set-description-user-input"
            type="text"
            placeholder="Beschreibung eingeben"
          />
        </div>
      </div>
    </div>
  </div>
  <div class="button-container">
    <button id="question-set-create-button">Kartei-Kategorie erstellen</button>
  </div>
</section>
